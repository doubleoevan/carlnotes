<!doctype html>
<html lang="en">

    <title>CarlNotes</title>
    <!-- apply the saved theme before first paint, so the page never flashes the wrong theme on load -->
    <script>
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark")
      }
    </script>
    <script type="module" src="src/main.tsx"></script>
  </head>

    <div id="root"></div>
  </body>
