  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

-on-click=\"{{ stop }}\" style=\"position:absolute;left:24px;top:34px;z-index:25;width:min(280px,72vw);background:var(--resource);border:1px solid var(--border);border-radius:9px;padding:12px;display:block;font-size:13px;color:var(--ink)\">\n                              <span style=\"display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)\">Carl's summary<\u002Fspan>\n                              <span style=\"display:block;margin:3px 0 9px\">{{ r.sum }}<\u002Fspan>\n                              <span sc-camel-on-click=\"{{ tgPlay }}\" style=\"display:inline-block;border:1px solid var(--border);border-radius:999px;padding:2px 12px;font-size:12px;cursor:pointer;color:var(--pill-ink)\">{{ playIcon }}<\u002Fspan>\n                            <\u002Fspan>\n                          <\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ t.hasMore }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div sc-camel-on-click=\"{{ t.tgMore }}\" style=\"font-size:14px;color:var(--link);padding:6px 2px 0;font-weight:600;cursor:pointer\">{{ t.moreLabel }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;steam&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Ambience&quot;},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;'light' | 'dark'&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let theme = this.props.defaultTheme ?? 'light';\n    try { theme = localStorage.getItem('cn-theme') || theme; } catch (e) {}\n    this.state = { theme, narrow: false, menuOpen: false, tip: null, playing: false, expanded: {}, collapsed: {}, refreshKey: 0 };\n    // Animation gating lives on the instance, NOT in state: the runtime can\n    // restore state snapshots asynchronously, which was wiping this map.\n    this.secIn = {};\n  }\n\n  data() {\n    return [\n      { id: 'yours', label: 'Your topics', topics: [\n        { id: 'lunar', title: 'Lunar property law', tags: ['law', 'space'], nnew: 3, own: true,\n          info: { prompt: 'Track who can legally own, lease, or mine lunar territory. Treaties, court cases, startup claims.', sources: 'spacelawreview.org · un.org/oosa', schedule: 'Daily at 6:00 am · last scan 2h ago', created: 'Created Jun 3, 2026' },\n          attachments: ['moon-treaty.pdf', 'notes.md'],\n          resources: [\n            { icon: '▤', title: 'Who actually owns the Sea of Tranquility', meta: 'law review · 2h', sum: \"No one owns it — but a law review argues the Artemis Accords' \\u201csafety zones\\u201d work like de facto claims, and nobody's positioned to object.\" },\n            { icon: '▶', title: 'Moon deeds explained in 12 minutes', meta: 'video · 5h', sum: 'Those novelty \\u201cmoon deed\\u201d certificates are legally worthless — the video walks through why, then covers what actual lunar leasing might look like.' },\n            { icon: '▤', title: 'Artemis Accords, annotated', meta: 'substack · 1d', sum: \"Line-by-line margin notes on the Accords. The interesting part is what's not in there: enforcement.\" },\n            { icon: '✉', title: \"OST Article II — this week's reading\", meta: 'newsletter · 1d', sum: \"Article II in plain words: no sovereignty, no exceptions. The newsletter argues that's exactly why companies route around it.\" },\n            { icon: '▤', title: \"Luxembourg's mining registry quietly grows\", meta: 'news · 2d', sum: 'Luxembourg keeps registering space-mining companies. Quietly, and faster than anyone else.' },\n            { icon: '▶', title: 'Panel: property rights past the Kármán line', meta: 'video · 3d', sum: 'Four lawyers, one moderator, zero agreement — but the \\u201cuse rights vs. title\\u201d framing is worth the hour.' },\n            { icon: '▤', title: 'Case note: Nemitz v. United States, revisited', meta: 'paper · 4d', sum: \"The one time someone sued for asteroid property rights, and why the court didn't bite.\" },\n            { icon: '▤', title: 'Startup claims a crater; lawyers respond', meta: 'news · 4d', sum: 'A startup painted a crater on its pitch deck. The responses from actual space lawyers are the good part.' },\n            { icon: '✉', title: 'Space law digest #142', meta: 'newsletter · 5d', sum: 'This week: two treaty op-eds, one licensing spat, and a genuinely useful explainer on launch-state liability.' },\n            { icon: '▤', title: 'Mining rights vs. ownership — a primer', meta: 'blog · 6d', sum: 'The primer to send people who conflate mining rights with ownership. Short, blunt, correct.' },\n            { icon: '▶', title: \"Lecture: the Moon Agreement's failure\", meta: 'video · 1w', sum: 'Why the 1979 Moon Agreement failed: nobody with a rocket signed it. The lecture makes it interesting anyway.' },\n            { icon: '▤', title: 'Who enforces anything up there?', meta: 'essay · 1w', sum: 'Honest answer: nobody, yet. The essay maps who could — and why they won\\u2019t volunteer.' }\n          ] },\n        { id: 'ow', title: 'Open-weight model releases', tags: ['ai'], nnew: 1, own: true,\n          info: { prompt: 'Watch for new open-weight model releases, license terms, and independent benchmark results.', sources: 'hf.co/blog · arxiv sanity', schedule: 'Weekly on Mondays · last scan 4h ago', created: 'Created May 12, 2026' },\n          attachments: [],\n          resources: [\n            { icon: '▤', title: 'Two agents opened for sci-fi queries', meta: 'blog · 4h', sum: 'Two labs opened their weights this week; licenses are permissive-ish. Benchmarks self-reported, so squint.' },\n            { icon: '▤', title: 'Weights drop, benchmarks follow', meta: 'hn · 6h', sum: 'Weights dropped, benchmark claims followed within hours. The comment section did the actual evals.' }\n          ] }\n      ]},\n      { id: 'feat', label: 'Featured', topics: [\n        { id: 'synth', title: 'Vintage synth repair', tags: ['music'], nnew: 0, own: false,\n          info: { prompt: 'Service guides, recap tutorials, and parts sources for 80s polysynths.', sources: 'synthdiy.wiki · mod.wiggler forums', schedule: 'Weekly on Fridays · last scan 2d ago', created: 'Created Apr 2, 2026' },\n          attachments: ['juno-service-manual.pdf'],\n          resources: [\n            { icon: '▶', title: 'Recapping a Juno-106 voice chip', meta: 'video · 2d', sum: 'A patient walkthrough of recapping a Juno-106 voice chip without lifting pads. Bookmark the desoldering section.' },\n            { icon: '▤', title: 'Sourcing 80s membrane switches', meta: 'forum · 4d', sum: \"Where to still find 80s membrane switches, and which modern substitutes won't feel wrong.\" }\n          ] }\n      ]},\n      { id: 'pop', label: 'Popular', topics: [\n        { id: 'glp1', title: 'GLP-1 supply chain', tags: ['health'], nnew: 0, own: false,\n          info: { prompt: 'Track GLP-1 manufacturing capacity, compounding rules, and pricing moves.', sources: 'fda.gov · statnews.com', schedule: 'Daily at 7:00 am · last scan 3h ago', created: 'Created Feb 18, 2026' },\n          attachments: [],\n          resources: [\n            { icon: '▤', title: 'Compounding pharmacies face the cliff', meta: 'news · 3h', sum: 'The compounding carve-out is closing. Pharmacies have months, not years — the article maps who absorbs the demand.' },\n            { icon: '▤', title: \"Supply normalizes, prices don't\", meta: 'analysis · 1d', sum: \"Supply has normalized; list prices haven't moved. The piece explains the gap in one chart.\" }\n          ] },\n        { id: 'euai', title: 'EU AI Act enforcement', tags: ['policy'], nnew: 0, own: false,\n          info: { prompt: 'Follow EU AI Act enforcement: fines, guidance, and member-state divergence.', sources: 'digital-strategy.ec.europa.eu', schedule: 'Twice weekly · last scan 5h ago', created: 'Created Mar 30, 2026' },\n          attachments: [],\n          resources: [\n            { icon: '▤', title: 'First enforcement actions land', meta: 'news · 5h', sum: \"First AI Act enforcement actions: two fines, both for documentation, not model behavior. That's the signal.\" },\n            { icon: '✉', title: 'Brussels digest: AI Act edition', meta: 'newsletter · 2d', sum: 'Deadlines by company size, in an actually readable table. Rare.' }\n          ] }\n      ]}\n    ];\n  }\n\n  componentDidMount() {\n    this.applyTheme();\n    this.measure = () => this.setState({ narrow: window.innerWidth < 640 });\n    this.measure();\n    window.addEventListener('resize', this.measure);\n    this.onDoc = (e) => {\n      if (e === this.lastHandled) return;\n      if (e.target && e.target.closest && e.target.closest('[data-keep-open]')) return;\n      if (this.state.tip || this.state.menuOpen) this.setState({ tip: null, menuOpen: false });\n    };\n    document.addEventListener('click', this.onDoc);\n    this.observe();\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this.measure);\n    document.removeEventListener('click', this.onDoc);\n    if (this.io) this.io.disconnect();\n    if (this.fallbackTimer) clearTimeout(this.fallbackTimer);\n  }\n\n  mark(e) { this.lastHandled = (e && e.nativeEvent) || e; }\n  applyTheme() {\n    document.body.classList.toggle('dark', this.state.theme === 'dark');\n    try { localStorage.setItem('cn-theme', this.state.theme); } catch (e) {}\n  }\n  observe() {\n    if (this.io) this.io.disconnect();\n    this.io = new IntersectionObserver((es) => {\n      es.forEach((en) => {\n        if (en.isIntersecting) {\n          const id = en.target.getAttribute('data-sec');\n          this.io.unobserve(en.target);\n          this.secIn[id] = true;\n          this.forceUpdate();\n        }\n      });\n    }, { threshold: 0.12 });\n    requestAnimationFrame(() => {\n      document.querySelectorAll('[data-sec]').forEach((el) => {\n        this.io.observe(el);\n        // Fallback: observer callbacks don't fire in hidden/captured tabs —\n        // mark sections already within the viewport as visible immediately.\n        const r = el.getBoundingClientRect();\n        const vh = window.innerHeight || document.documentElement.clientHeight;\n        if (r.top < vh && r.bottom > 0) {\n          this.secIn[el.getAttribute('data-sec')] = true;\n          this.forceUpdate();\n        }\n      });\n    });\n    // Safety net: never allow animation gating to permanently hide content.\n    if (this.fallbackTimer) clearTimeout(this.fallbackTimer);\n    this.fallbackTimer = setTimeout(() => {\n      this.data().forEach((s) => { this.secIn[s.id] = true; });\n      this.forceUpdate();\n    }, 1500);\n  }\n\n  renderVals() {\n    const st = this.state;\n    const round = (x) => Math.round(x * 100) / 100;\n    const sections = this.data().map((s) => {\n      const open = !st.collapsed[s.id];\n      let base = 0.05;\n      const topics = s.topics.map((t) => {\n        const words = t.title.split(' ').map((w, i) => ({ t: w, d: round(base + i * 0.1) }));\n        const infoD = round(base + words.length * 0.1 + 0.15);\n        const badgeD = round(infoD + 0.35);\n        const mk = (r, i, animBase, isLast) => ({\n          ...r,\n          d: round(animBase + i * 0.1),\n          border: isLast ? 'none' : '1px dashed var(--dash)',\n          z: 10 - i,\n          tip: st.tip === 'r:' + t.id + ':' + r.title,\n          tgTip: (e) => { this.mark(e); const k = 'r:' + t.id + ':' + r.title; this.setState((p) => ({ tip: p.tip === k ? null : k, menuOpen: false })); }\n        });\n        const rowBase = round(base + words.length * 0.1 + 0.1);\n        const shownRaw = t.resources.slice(0, 5);\n        const extraRaw = t.resources.slice(5);\n        const expanded = !!st.expanded[t.id];\n        const shown = shownRaw.map((r, i) => mk(r, i, rowBase, i === shownRaw.length - 1 && (!expanded || extraRaw.length === 0)));\n        const extra = extraRaw.map((r, i) => mk(r, i, 0, i === extraRaw.length - 1));\n        base = round(rowBase + shownRaw.length * 0.1 + 0.25);\n        return {\n          ...t,\n          words, infoD, badgeD, shown, extra,\n          hasNew: t.nnew > 0,\n          newLabel: t.nnew + ' new',\n          hasAttachments: t.attachments.length > 0,\n          attachments: t.attachments.map((a) => ({ label: t.own ? a + ' ↓' : a })),\n          hasMore: extraRaw.length > 0,\n          expanded,\n          moreLabel: expanded ? 'show less \\u25b4' : '+ ' + extraRaw.length + ' more \\u25be',\n          tgMore: () => this.setState((p) => ({ expanded: { ...p.expanded, [t.id]: !p.expanded[t.id] } })),\n          tip: st.tip === 't:' + t.id,\n          tgTip: (e) => { this.mark(e); const k = 't:' + t.id; this.setState((p) => ({ tip: p.tip === k ? null : k, menuOpen: false })); }\n        };\n      });\n      return {\n        ...s, topics, open,\n        arrow: open ? '▾' : '▸',\n        inCls: this.secIn[s.id] ? 'in' : '',\n        toggle: () => this.setState((p) => ({ collapsed: { ...p.collapsed, [s.id]: !p.collapsed[s.id] } }))\n      };\n    });\n    return {\n      steam: this.props.steam ?? true,\n      wide: !st.narrow,\n      narrow: st.narrow,\n      menuOpen: st.menuOpen,\n      tgMenu: (e) => { this.mark(e); this.setState((p) => ({ menuOpen: !p.menuOpen, tip: null })); },\n      themeIcon: st.theme === 'light' ? '☾' : '☀',\n      themeLabel: st.theme === 'light' ? 'Dark mode' : 'Light mode',\n      tgTheme: (e) => {\n        this.mark(e);\n        this.setState((p) => ({ theme: p.theme === 'light' ? 'dark' : 'light' }));\n        setTimeout(() => this.applyTheme(), 0);\n      },\n      refreshKey: st.refreshKey,\n      refresh: () => {\n        // Remounted nodes arrive already marked 'in', so CSS animations\n        // replay on insertion — no timers or observers needed.\n        this.data().forEach((s) => { this.secIn[s.id] = true; });\n        this.setState((p) => ({ refreshKey: p.refreshKey + 1, tip: null }));\n      },\n      stop: (e) => { this.mark(e); },\n      playIcon: st.playing ? '❚❚ pause' : '▷ listen',\n      tgPlay: (e) => { this.mark(e); this.setState((p) => ({ playing: !p.playing })); },\n      sections\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
