model_list:
  # plan-model: whole-repo planning, big context
  - model_name: plan-model
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/minimax-m3
    model_info:
      friendly_name: "MiniMax M3"
      supports_function_calling: true   
      supports_vision: true             
      supports_prompt_caching: true
      max_input_tokens: 524288          
      max_output_tokens: 16384

  # apply-model: long-horizon spec implementation
  - model_name: apply-model
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/kimi-k2p7-code
    model_info:
      friendly_name: "Kimi K2.7 Code"
      supports_function_calling: true
      supports_vision: true
      supports_prompt_caching: true
      max_input_tokens: 262144
      max_output_tokens: 16384

  # aside-model: cheap side conversations and plan-agent reads
  - model_name: aside-model
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/minimax-m3
    model_info:
      friendly_name: "MiniMax M3 (aside)"
      supports_function_calling: true
      supports_vision: true
      supports_prompt_caching: true
      max_input_tokens: 524288
      max_output_tokens: 8192

  # cheap-model: high-volume app inference (search query generation, first-pass scoring) — the cheap tier
  - model_name: cheap-model
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/minimax-m3
    model_info:
      friendly_name: "MiniMax M3 (app cheap tier)"
      supports_function_calling: true
      supports_vision: true
      supports_prompt_caching: true
      max_input_tokens: 524288
      max_output_tokens: 8192

  # score-model: the curation premium tier — re-scores promoted Resources and writes why-summaries (tunable: pick best relevance-per-dollar on eval)
  - model_name: score-model
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/glm-5p2
    model_info:
      friendly_name: "GLM 5.2"
      supports_function_calling: true
      supports_prompt_caching: true
      max_input_tokens: 1048576
      max_output_tokens: 8192

  # embed-model: the curation embedding tier — output_vector_size MUST equal the schema's resources.embedding dimension (768)
  - model_name: embed-model
    litellm_params:
      model: fireworks_ai/nomic-ai/nomic-embed-text-v1.5
    model_info:
      friendly_name: "Nomic Embed Text v1.5 (768-dim)"
      mode: embedding
      output_vector_size: 768

# drop provider-unsupported params instead of erroring (Fireworks embeddings reject encoding_format the AI SDK sends)
litellm_settings:
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL